<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oriana Clinics</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --primary-color: #d4af37;
  --bg-color: #ffffff;
}

body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:var(--bg-color);
  direction:rtl;
  color:#333;
}

header{
  text-align:center;
  padding:80px 20px;
}

.logo{
  max-width:150px;
  margin-bottom:20px;
}

.hero-title{
  font-size:36px;
  color:var(--primary-color);
}

.section{
  padding:60px 20px;
  text-align:center;
}

.services{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:25px;
}

.card{
  background:#fff;
  width:280px;
  padding:25px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.btn{
  background:var(--primary-color);
  color:#fff;
  padding:12px 25px;
  border-radius:30px;
  text-decoration:none;
  display:inline-block;
  margin-top:15px;
}

footer{
  text-align:center;
  padding:30px;
  background:#f5f5f5;
}
</style>
</head>
<body>

<header>
  <img id="logo" class="logo" src="" alt="Logo">
  <h1 class="hero-title" id="heroTitle"></h1>
  <p id="heroDesc"></p>
  <a id="whatsappBtn" class="btn" target="_blank">احجزي الآن</a>
</header>

<section class="section">
  <h2 style="color:var(--primary-color)">خدماتنا</h2>
  <div class="services" id="servicesContainer"></div>
</section>

<footer>
  <div>
    <a id="instagramLink" target="_blank">Instagram</a> |
    <a id="facebookLink" target="_blank">Facebook</a>
  </div>
  <p>© 2026 Oriana Clinics</p>
</footer>

<script src="config.js"></script>
<script src="services.js"></script>
</body>
</html>
